<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <!--Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">


    <title>Form</title>
</head>
<body>
    <main class="main__form flex">
        <form class="form">
            <h1>Formulário de contato</h1>
            <hr>
            <fieldset class="flex">
                <legend>Dados Pessoais</legend>

            <div class="form__box">
                <label for="nome">Nome*</label>
                <input type="text" name="nome" id="nome" required  placeholder="Insira aqui seu nome." minlength="3">
                <p class="mensagem-erro"></p>
            </div>    
                
            <div class="form__box">
                <label for="sobrenome">Sobrenome*</label>
                <input type="text" name="sobrenome" id="sobrenome" required  placeholder="Insira aqui seu sobrenome." minlength="3">
                <p class="mensagem-erro"></p>
            </div>
            </fieldset>
            
            <fieldset>
                <legend>Contato</legend>

                <div class="form__box">
                    <label for="email">Email*</label>
                    <input type="email" name="email" id="email" required placeholder="email@email.com">
                    <p class="mensagem-erro"></p>
                </div>  
            
                <div class="form__box">
                    <label for="celular">Celular</label>
                    <input type="tel" name="celular" id="celular" placeholder="(00) 00000-0000" pattern="^\(\d{2}\) 9\d{4}-\d{4}$" minlength="15" maxlength="15">
                </div>
            </fieldset>    
                
            
            <fieldset>
                <legend>Mensagem*</legend>
                <div class="form__box">
                    <label for="mensagem">Mensagem*</label>
                    <textarea name="mensagem" id="mensagem" minlength="50" maxlength="500" required placeholder="Insira aqui o motivo do contato."></textarea>
                    <p class="mensagem-erro"></p>
                </div>
            </fieldset>
            
            <button type="submit" class="form__botao" id="form__botao">Enviar</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
